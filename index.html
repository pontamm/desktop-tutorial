<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS接近検知システム</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; text-align: center; background: #f3f4f6; color: #333; }
        h2 { margin-bottom: 5px; color: #111; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; }
        .card-title { font-weight: bold; margin-bottom: 5px; color: #4b5563; font-size: 14px; border-bottom: 1px solid #e5e7eb; padding-bottom: 4px; }
        
        /* 接近アラート画面のスタイル */
        #alert-area { display: none; background: #fee2e2; border: 2px solid #ef4444; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .alert-title { font-size: 18px; font-weight: bold; color: #b91c1c; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .btn-container { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        button { flex: 1; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-yes { background: #10b981; }
        .btn-no { background: #ef4444; }
        #status { font-size: 14px; color: #6b7280; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <h2>GPS移動モニター</h2>
    <div id="status">位置情報を追跡中...</div>

    <!-- 1. 現在地表示カード -->
    <div class="card">
        <div class="card-title">📍 現在の状況</div>
        <div id="current-pos">GPS信号を探しています...</div>
    </div>

    <!-- 2. 【自動出現】過去のデータ接近アラート -->
    <div id="alert-area">
        <div class="alert-title">⚠️ 過去の記録場所に接近中！</div>
        <div id="past-data-display" style="font-size: 15px; margin-bottom: 10px; line-height: 1.4;"></div>
        
        <div class="card-title" style="border-bottom: 1px solid #fca5a5; color: #991b1b;">📝 今回の情報を入力</div>
        <input type="text" id="comment" placeholder="今回のコメントを入力（任意）">
        <div class="btn-container">
            <button class="btn-yes" onclick="sendData('会えた')">会えた</button>
            <button class="btn-no" onclick="sendData('会えない')">会えない</button>
        </div>
    </div>

    <!-- 3. 周辺情報カード -->
    <div class="card">
        <div class="card-title">🔍 周辺のデータ状況</div>
        <div id="nearby-status">過去のデータを読み込んでいます...</div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbxfpcQYpHnqgNrV36TUWbikUqYbjpAQpTuFWpiwcFType-BNA7TqcEyamyhY-6XIWNvUg/exec"; // ★【重要】ここに新しいGASのURLを貼る

        let pastRecords = []; // 過去の全データを入れる配列
        const TARGET_DISTANCE = 25; // 接近とみなす距離（メートル単位・ここでは25m）

        // 2点間の緯度経度から距離（メートル）を計算する関数（ヒュベニの公式）
        function getDistance(lat1, lng1, lat2, lng2) {
            const rad = x => x * Math.PI / 180;
            const rx = 6378137.0; // 赤道半径
            const ry = 6356752.314245; // 極半径
            const dy = rad(lat1 - lat2);
            const dx = rad(lng1 - lng2);
            const my = rad((lat1 + lat2) / 2);
            const e2 = (rx*rx - ry*ry) / (rx*rx);
            const w = Math.sqrt(1 - e2 * Math.sin(my) * Math.sin(my));
            const m = rx * (1 - e2) / (w*w*w);
            const n = rx / w;
            return Math.sqrt(Math.pow(dy*m, 2) + Math.pow(dx*n*Math.cos(my), 2));
        }

        // ページを開いた時に、自動で過去のデータをスプレッドシートから読み込む
        window.onload = () => {
            if (gasUrl === "YOUR_WEB_APP_URL") {
                alert("GASのURLを正しく設定してください！");
                return;
            }
            
            // GASに「データをちょうだい（action=read）」とリクエストを送る
            fetch(gasUrl + "?action=read")
                .then(res => res.json())
                .then(data => {
                    pastRecords = data;
                    document.getElementById("nearby-status").innerText = "過去のデータを " + data.length + " 件読み込みました。歩いてみてください。";
                    startTracking(); // データの読み込みが終わったら位置の追跡を開始
                })
                .catch(() => {
                    document.getElementById("nearby-status").innerText = "過去データの読み込みに失敗しました。";
                    startTracking();
                });
        };

        // スマホの位置をリアルタイムに追いかける関数（watchPosition）
        function startTracking() {
            navigator.geolocation.watchPosition((pos) => {
                const currentLat = pos.coords.latitude;
                const currentLng = pos.coords.longitude;
                
                document.getElementById("current-pos").innerHTML = "緯度: " + currentLat.toFixed(5) + "<br>経度: " + currentLng.toFixed(5);
                
                let closeHouse = null;
                let minDistance = Infinity;

                // 過去のデータ（家）を1つずつループして、現在地からの距離を調べる
                pastRecords.forEach(record => {
                    const dist = getDistance(currentLat, currentLng, record.lat, record.lng);
                    if (dist < minDistance) {
                        minDistance = dist;
                        closeHouse = record;
                    }
                });

                // 一番近い家が25メートル以内の場合、画面に「現在の情報入力欄」を出す
                const alertArea = document.getElementById("alert-area");
                if (closeHouse && minDistance <= TARGET_DISTANCE) {
                    // 日時の見栄えを整える
                    const dateStr = new Date(closeHouse.dateTime).toLocaleString('ja-JP');
                    
                    document.getElementById("past-data-display").innerHTML = 
                        "<b>直線距離:</b> 約" + Math.round(minDistance) + "m以内<br>" +
                        "<b>前回の訪問日:</b> " + dateStr + "<br>" +
                        "<b>前回の結果:</b> " + closeHouse.status + "<br>" +
                        "<b>前回のメモ:</b> " + (closeHouse.comment || "なし");
                    
                    alertArea.style.display = "block"; // 隠していた入力画面を表示
                    document.getElementById("nearby-status").innerText = "近くに過去の記録場所があります！";
                } else {
                    alertArea.style.display = "none"; // 離れたら画面を隠す
                    if (closeHouse) {
                        document.getElementById("nearby-status").innerText = "一番近い過去の記録場所まで、あと約 " + Math.round(minDistance) + " メートルです。";
                    }
                }
            }, (err) => {
                document.getElementById("current-pos").innerText = "GPS追跡エラー: " + err.message;
            }, { enableHighAccuracy: true }); // 高精度モードをオン
        }

        // データの送信処理（前回と同じ機能）
        function sendData(statusResult) {
            const statusLabel = document.getElementById("status");
            const commentValue = document.getElementById("comment").value;

            statusLabel.innerText = "データをスプレッドシートへ送信中...";

            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                const finalUrl = gasUrl + "?lat=" + lat + "&lng=" + lng + "&status=" + encodeURIComponent(statusResult) + "&comment=" + encodeURIComponent(commentValue);
                
                fetch(finalUrl, { mode: 'no-cors' })
                    .then(() => {
                        statusLabel.innerText = "✅ 今回のデータを保存しました！ (" + statusResult + ")";
                        document.getElementById("comment").value = ""; 
                        
                        // 送信が終わったら、最新のデータを反映させるためにページをリロードする
                        setTimeout(() => { location.reload(); }, 1500);
                    })
                    .catch(() => {
                        statusLabel.innerText = "❌ 送信に失敗しました";
                    });
            });
        }
    </script>
</body>
</html>
